name: Build Android APK
on:
  push:
    branches: [ main ]
    paths:
      - 'servicestuff/**' # শুধুমাত্র servicestuff ফোল্ডারে কোড চেঞ্জ হলে বিল্ড হবে

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create .env file from Secrets
        run: |
          cd servicestuff
          echo "VITE_PORTAL_API_URL=${{ secrets.VITE_PORTAL_API_URL }}" >> .env
          echo "VITE_REALTIME_URL=${{ secrets.VITE_REALTIME_URL }}" >> .env
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Install dependencies
        run: |
          cd servicestuff
          npm install

      - name: Build Web Project
        run: |
          cd servicestuff
          npm run build

      - name: Sync Capacitor
        run: |
          cd servicestuff
          npx cap sync android

      - name: Build with Gradle
        run: |
          cd servicestuff/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: servicestuff/android/app/build/outputs/apk/debug/app-debug.apk
