name: Build Android APK (React Native)
on:
  push:
    branches: [main]
    paths:
      - 'servicestuff-rn/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'servicestuff-rn/package-lock.json'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create .env file from Secrets
        run: |
          cd servicestuff-rn
          echo "EXPO_PUBLIC_PORTAL_API_URL=${{ secrets.EXPO_PUBLIC_PORTAL_API_URL }}" >> .env
          echo "EXPO_PUBLIC_REALTIME_URL=${{ secrets.EXPO_PUBLIC_REALTIME_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: Install dependencies
        run: |
          cd servicestuff-rn
          npm install --legacy-peer-deps

      - name: Build APK (Local)
        run: |
          cd servicestuff-rn
          # Use eas directly as it's installed by the Setup Expo action
          # We use --local to save build credits. This requires Android SDK/Java on runner.
          eas build -p android --profile preview --non-interactive --local --output=app-release.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_SKIP_AUTO_FINGERPRINT: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Suzuki-Service-Pro-APK
          path: servicestuff-rn/app-release.apk
